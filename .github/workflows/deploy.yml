steps:
      - uses: actions/checkout@v4

      - name: Deploy to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: access-5020016202.webspace-host.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: sftp
          port: 22
          server-dir: ./